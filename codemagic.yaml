workflows:
  muleba-android-release:
    name: Muleba Leadership — Android APK
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      java: 17

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build release APK
        script: |
          flutter build apk \
            --release \
            --no-split-per-abi

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
